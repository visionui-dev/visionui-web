<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Compra Exitosa! - VisionUI Apps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="vui.ico">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#48cbcb",
                        "background-dark": "#131f1f",
                        "card-dark": "#1a1a1a",
                    },
                    fontFamily: { "display": ["Space Grotesk", "sans-serif"], "sans": ["Space Grotesk", "sans-serif"] },
                    borderRadius: {
                        "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; }
        .glass-card {
            background: rgba(30, 37, 37, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(72, 203, 203, 0.1);
        }
        .glow-bg {
            background: radial-gradient(circle at center, rgba(61, 216, 216, 0.15) 0%, rgba(19, 31, 31, 0) 70%);
        }
        .input-field {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.75rem;
            color: white;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .input-field:focus { border-color: #48cbcb; outline: none; }
        .input-field::placeholder { color: rgba(255,255,255,0.25); }
        .input-field:disabled { opacity: 0.6; }
        .password-strength {
            height: 4px; background: rgba(255,255,255,0.1);
            border-radius: 2px; margin-top: 0.5rem; overflow: hidden;
        }
        .password-strength-bar {
            height: 100%; width: 0%;
            border-radius: 2px; transition: all 0.3s;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-background-dark text-white min-h-screen flex flex-col font-display overflow-x-hidden relative">

    <!-- Glow Background -->
    <div class="fixed inset-0 glow-bg pointer-events-none"></div>

    <!-- Floating Navbar -->
    <nav class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-full max-w-[960px] px-6">
        <div class="glass-card rounded-full px-6 py-3 flex items-center justify-between shadow-2xl border border-white/5">
            <a href="index.html" class="flex items-center gap-3 no-underline text-white">
                <div class="text-primary">
                    <svg class="w-8 h-8" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path clip-rule="evenodd" d="M24 0.757355L47.2426 24L24 47.2426L0.757355 24L24 0.757355ZM21 35.7574V12.2426L9.24264 24L21 35.7574Z" fill="currentColor" fill-rule="evenodd"></path>
                    </svg>
                </div>
                <span class="text-xl font-bold tracking-tight">VisionUI</span>
            </a>
            <div class="hidden md:flex items-center gap-8">
                <a class="text-sm font-medium text-white/70 hover:text-primary transition-colors" href="index.html#features">Features</a>
                <a class="text-sm font-medium text-white/70 hover:text-primary transition-colors" href="store.html">Apps</a>
                <a class="text-sm font-medium text-white/70 hover:text-primary transition-colors" href="docs.html">Documentation</a>
            </div>
            <a href="account.html" class="bg-primary/10 hover:bg-primary/20 text-primary px-4 py-2 rounded-full text-sm font-semibold transition-all no-underline">
                Dashboard
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center p-6 pt-32 pb-12 relative z-10">
        <div class="w-full max-w-[560px] glass-card rounded-xl p-8 md:p-12 shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex flex-col items-center text-center border border-white/10">

            <!-- Success Icon -->
            <div class="relative mb-8">
                <div class="absolute inset-0 bg-primary/20 blur-2xl rounded-full"></div>
                <div class="relative size-24 md:size-28 rounded-full border-2 border-primary/30 flex items-center justify-center bg-primary/10">
                    <div class="size-16 md:size-20 rounded-full bg-primary flex items-center justify-center text-background-dark shadow-[0_0_30px_rgba(72,203,203,0.5)]"
                        style="animation: bounceIn 0.6s ease">
                        <span class="material-symbols-outlined text-4xl md:text-5xl font-bold" style="font-variation-settings:'FILL' 1">check</span>
                    </div>
                </div>
            </div>

            <!-- Headlines -->
            <h1 class="text-3xl md:text-4xl font-extrabold text-white mb-4 tracking-tight">¡Compra Exitosa!</h1>
            <p class="text-white/60 text-lg leading-relaxed mb-8 max-w-md">
                Tu licencia ha sido procesada. Ahora configura tu contraseña para acceder a la aplicación.
            </p>

            <!-- Setup Password Form -->
            <div class="w-full text-left" id="setupSection">
                <div class="bg-primary/5 border border-primary/20 rounded-xl p-4 mb-6 text-center">
                    <p class="text-primary text-sm font-medium">📧 Configura tu cuenta para descargar</p>
                </div>

                <form id="setupForm" onsubmit="setupPassword(event)" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-white/50 mb-2">Email</label>
                        <input type="email" id="email" name="email" required placeholder="tu@email.com" class="input-field">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-white/50 mb-2">Clave de Licencia</label>
                        <input type="text" id="license_key" name="license_key" required placeholder="LIC-XXXX-XXXXXX" class="input-field font-mono">
                        <p class="text-xs text-white/30 mt-1">Revisa tu email para obtener la clave</p>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-white/50 mb-2">Nueva Contraseña</label>
                        <input type="password" id="password" name="password" required minlength="6" placeholder="Mínimo 6 caracteres" class="input-field">
                        <div class="password-strength"><div class="password-strength-bar" id="strengthBar"></div></div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-white/50 mb-2">Confirmar Contraseña</label>
                        <input type="password" id="password_confirm" name="password_confirm" required placeholder="Repite tu contraseña" class="input-field">
                    </div>

                    <div id="formError" class="hidden bg-red-500/10 border border-red-500/30 rounded-xl p-3 text-red-300 text-sm"></div>
                    <div id="formSuccess" class="hidden bg-emerald-500/10 border border-emerald-500/30 rounded-xl p-3 text-emerald-300 text-sm"></div>

                    <button type="submit" id="submitBtn"
                        class="w-full bg-primary hover:bg-[#3dbdbd] text-background-dark font-bold py-4 px-8 rounded-full flex items-center justify-center gap-2 transition-all transform hover:scale-[1.02] shadow-lg shadow-primary/20">
                        <span id="btnText">Configurar Contraseña</span>
                        <span id="btnLoading" class="hidden text-sm">Configurando...</span>
                    </button>
                </form>
            </div>

            <!-- Quick action buttons -->
            <div class="w-full flex flex-col gap-3 mt-6">
                <button onclick="window.location.href='account.html'" class="text-white/60 hover:text-white font-semibold py-2 px-6 rounded-full transition-colors flex items-center justify-center gap-2">
                    <span>Ir a Mi Cuenta</span>
                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
                </button>
            </div>

            <p class="mt-6 text-xs text-white/30 font-medium">
                ¿Necesitas ayuda? <a class="text-primary/60 hover:text-primary underline transition-colors" href="mailto:soporte@visionui.app">soporte@visionui.app</a>
            </p>
        </div>
    </main>

    <!-- Visual Decoration -->
    <div class="fixed bottom-0 left-0 w-full h-1/3 bg-gradient-to-t from-primary/5 to-transparent pointer-events-none"></div>
    <div class="fixed -bottom-24 -left-24 size-96 bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="fixed top-1/4 -right-24 size-64 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>

    <script>
        const API_BASE = 'https://admin.visionui.app';

        // Auto-fill from URL params
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('email')) document.getElementById('email').value = urlParams.get('email');
        if (urlParams.get('key')) document.getElementById('license_key').value = urlParams.get('key');

        // Password strength checker
        document.getElementById('password').addEventListener('input', function(e) {
            const password = e.target.value;
            const bar = document.getElementById('strengthBar');
            let strength = 0;
            if (password.length >= 6) strength += 25;
            if (password.length >= 10) strength += 25;
            if (/[A-Z]/.test(password)) strength += 25;
            if (/[0-9]/.test(password) || /[^a-zA-Z0-9]/.test(password)) strength += 25;
            bar.style.width = strength + '%';
            bar.style.background = strength < 50 ? '#ef4444' : strength < 75 ? '#f59e0b' : '#10b981';
        });

        async function setupPassword(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const licenseKey = document.getElementById('license_key').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password_confirm').value;

            const errorDiv = document.getElementById('formError');
            const successDiv = document.getElementById('formSuccess');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');
            const submitBtn = document.getElementById('submitBtn');

            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');

            if (password !== passwordConfirm) {
                errorDiv.textContent = 'Las contraseñas no coinciden';
                errorDiv.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            try {
                const response = await fetch(`${API_BASE}/api/setup-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, license_key: licenseKey, password })
                });
                const data = await response.json();
                if (data.success) {
                    successDiv.innerHTML = `✓ ¡Contraseña configurada! Ahora puedes usar estas credenciales en tu aplicación.<br><br><strong>Usuario:</strong> ${email}`;
                    successDiv.classList.remove('hidden');
                    document.querySelectorAll('#setupForm input').forEach(i => i.disabled = true);
                    submitBtn.style.display = 'none';
                } else {
                    throw new Error(data.error || 'Error configurando la contraseña');
                }
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
